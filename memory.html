<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="memoryScript.js" defer></script>
    <link rel="stylesheet" href="memoryStyle.css">
</head>
    <body>  
        <nav>
            <h1>Memory Game</h1>
        </nav>
        <main>
            <section>
                <div>
                    <label for="name">Name</label>
                    <input type="text" name="" id="name">
                    <p id="nbrAttempt"></p>
                    <p id="timer">00:00</p>
                    <p id="pairFind"></p>    
                    <p id="score"></p>
                    <p id="bestScore"></p>
                    <button id="reset">Reset</button>
                    <div id="game-board">
                </div>

            </section>
            <section>
                <div>
                    <h2>Table of score</h2>
                    <ul id="tabScore">

                    </ul>
                </div>

            </section>
           
        </main>
     
    </body>
</html>
